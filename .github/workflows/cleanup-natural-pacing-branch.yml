name: Clean temporary natural pacing branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-natural-pacing-branch.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Delete temporary branch and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          git push origin --delete trigger-natural-word-pacing || true
          rm .github/workflows/cleanup-natural-pacing-branch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/cleanup-natural-pacing-branch.yml
          git commit -m "Remove temporary natural pacing cleanup workflow"
          git push origin HEAD:main
