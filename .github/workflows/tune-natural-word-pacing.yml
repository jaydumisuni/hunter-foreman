name: Tune ROSE natural word pacing

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/tune-natural-word-pacing.yml
  pull_request:
    paths:
      - .github/tune-natural-word-pacing-trigger.txt

permissions:
  contents: write

jobs:
  tune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Slow the word reveal to a natural reading rhythm
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/demo/public/rose-runtime.js')
          text = path.read_text(encoding='utf-8')
          replacements = {
              "    var delay=27+Math.min(30,word.length*1.7)+Math.floor(Math.random()*15);": "    var delay=70+Math.min(55,word.length*3)+Math.floor(Math.random()*41);",
              "    if(/[.!?][\"'’”’\\)\\]]*$/.test(word))delay+=105;": "    if(/[.!?][\"'’”’\\)\\]]*$/.test(word))delay+=280;",
              "    else if(/[,;:][\"'’”’\\)\\]]*$/.test(word))delay+=50;": "    else if(/[,;:][\"'’”’\\)\\]]*$/.test(word))delay+=130;",
              "    else if(/[—–-]$/.test(word))delay+=34;": "    else if(/[—–-]$/.test(word))delay+=95;",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected ROSE pacing line not found: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

          node --check apps/demo/public/rose-runtime.js
          rm .github/workflows/tune-natural-word-pacing.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/demo/public/rose-runtime.js .github/workflows/tune-natural-word-pacing.yml
          git commit -m "Give ROSE a natural word-by-word rhythm"
          git push origin HEAD:main
