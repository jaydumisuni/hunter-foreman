name: Temporary Hunter UI proof

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  HUNTER_PROOF_URL: https://895dd796-hunter-ui-review.thetechguy712.workers.dev/portal

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Capture exact deployed HTML
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            "$HUNTER_PROOF_URL?hunter-diagnostics=1&srg-headless=1" \
            --output hunter-portal.html
          curl --fail --silent --show-error --location --head \
            "$HUNTER_PROOF_URL?hunter-diagnostics=1&srg-headless=1" \
            --output hunter-portal-headers.txt

      - name: Install Playwright client
        shell: bash
        run: |
          set -euo pipefail
          npm init -y
          npm install --no-save playwright-core

      - name: Isolate each role in the proof harness
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('temp-hunter-ui-proof-v2.mjs')
          text = path.read_text(encoding='utf-8')
          old = """    if (!element) return null;\n    if (!element.id) element.id = `hunterV2Route${Math.random().toString(36).slice(2)}`;"""
          new = """    if (!element) element = nodes.find(node => (node.getAttribute('aria-label') || node.textContent || '').replace(/\\s+/g, ' ').trim() === desc.label);\n    if (!element) return null;\n    if (!element.id) element.id = `hunterV2Route${Math.random().toString(36).slice(2)}`;"""
          if old not in text:
              raise SystemExit('route fallback patch anchor missing')
          text = text.replace(old, new, 1)
          old = """    for (const role of roles) {\n      if (viewport.mobile) {"""
          new = """    for (const role of roles) {\n      await page.reload({ waitUntil: 'domcontentloaded', timeout: 60000 });\n      await page.waitForSelector('#roleSelect', { state: 'attached', timeout: 30000 });\n      await page.waitForFunction(() => Boolean(globalThis.__HUNTER_MOBILE_SIDEBAR__ && globalThis.__HUNTER_EXACT_HEAD_RECOVERY__), null, { timeout: 30000 });\n      await page.waitForTimeout(700);\n      if (viewport.mobile) {"""
          if old not in text:
              raise SystemExit('role isolation patch anchor missing')
          text = text.replace(old, new, 1)
          old = "await page.locator('#roleSelect').selectOption(role);"
          new = "await page.locator('#roleSelect').selectOption(role, { force: true });"
          if old not in text:
              raise SystemExit('role selection patch anchor missing')
          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Run exact deployed UI proof v2
        id: proof
        continue-on-error: true
        shell: bash
        run: node temp-hunter-ui-proof-v2.mjs

      - name: Upload UI proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hunter-ui-proof-v2
          path: |
            hunter-ui-proof-v2.json
            hunter-portal.html
            hunter-portal-headers.txt
            *-hunter-proof-v2.png
          if-no-files-found: error
          retention-days: 1

      - name: Enforce proof result
        if: steps.proof.outcome != 'success'
        shell: bash
        run: exit 1
