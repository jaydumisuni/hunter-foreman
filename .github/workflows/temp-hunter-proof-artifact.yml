name: Temporary Hunter UI proof

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  HUNTER_PROOF_URL: https://ec391a63-hunter-ui-review.thetechguy712.workers.dev/portal

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install Playwright client
        shell: bash
        run: |
          set -euo pipefail
          npm init -y
          npm install --no-save playwright-core

      - name: Run exact deployed UI proof
        id: proof
        continue-on-error: true
        shell: bash
        run: node temp-hunter-ui-proof.mjs

      - name: Upload UI proof evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hunter-ui-proof
          path: |
            hunter-ui-proof.json
            *-hunter-proof.png
          if-no-files-found: error
          retention-days: 1

      - name: Enforce proof result
        if: steps.proof.outcome != 'success'
        shell: bash
        run: exit 1
