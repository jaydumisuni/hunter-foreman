name: Refresh README checksum

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/refresh-readme-checksum.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Refresh README checksum and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          hash="$(sha256sum README.md | awk '{print toupper($1)}')"
          awk -v hash="$hash" 'NR==1 {$0=hash "  README.md"} {print}' proof/SHA256SUMS.txt > proof/SHA256SUMS.txt.tmp
          mv proof/SHA256SUMS.txt.tmp proof/SHA256SUMS.txt
          rm .github/workflows/refresh-readme-checksum.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add proof/SHA256SUMS.txt .github/workflows/refresh-readme-checksum.yml
          git commit -m "Refresh README checksum after final documentation update"
          git push origin HEAD:main
