name: One-time final main proof

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: read

jobs:
  finalize-and-prove:
    if: github.head_ref == 'final-main-hardening'
    runs-on: ubuntu-latest
    steps:
      - name: Check out proof branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply final consistency hardening
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          readme_path = Path('README.md')
          readme = readme_path.read_text(encoding='utf-8')

          replacements = [
              (
                  'These capabilities were completed and verified through the hackathon implementation and are considered implemented for the wider THETECHGUY business architecture.',
                  'These capabilities were completed and verified through the hackathon implementation and are implemented for the wider THETECHGUY business architecture.',
              ),
              (
                  'App Bridge view showing which business modules are demo-ready, planned, under maintenance, or not connected. These screenshot labels capture the submitted public-demo state; the business implementation boundary is clarified above so “not connected” is not mistaken for “unbuilt.”',
                  'This screenshot preserves the recorded submission-state labels. The current repository runtime uses **Not connected** for existing business systems excluded from the public demo, and **Planned** only for genuine future expansion items. The current runtime and automated tests are the source of truth.',
              ),
          ]

          for old, new in replacements:
              count = readme.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one README match, found {count}: {old[:100]}')
              readme = readme.replace(old, new, 1)

          readme_path.write_text(readme, encoding='utf-8')

          consistency_test = r'''const assert = require('assert');
          const fs = require('fs');
          const path = require('path');

          const root = path.join(__dirname, '..');
          const read = relativePath => fs.readFileSync(path.join(root, relativePath), 'utf8');
          const exists = relativePath => fs.existsSync(path.join(root, relativePath));

          const readme = read('README.md');
          const server = read('apps/demo/server.js');
          const packageJson = JSON.parse(read('package.json'));

          assert.ok(
            readme.includes('are implemented for the wider THETECHGUY business architecture.'),
            'README must state the settled implementation status directly',
          );
          assert.ok(
            readme.includes('The current runtime and automated tests are the source of truth.'),
            'README must distinguish the recorded screenshot from the current runtime',
          );

          const privateReferences = [
            'hunter_forman_public_submission',
            'jaydumisuni/hunter_forman_public_submission',
          ];

          const textExtensions = new Set([
            '.js', '.json', '.md', '.txt', '.yml', '.yaml', '.html', '.css', '.env', '.example', '.sh', '.ps1', '.dockerfile',
          ]);
          const ignoredDirectories = new Set(['.git', 'node_modules']);

          function collectTextFiles(directory, output = []) {
            for (const entry of fs.readdirSync(directory, { withFileTypes: true })) {
              if (ignoredDirectories.has(entry.name)) continue;
              const absolute = path.join(directory, entry.name);
              if (entry.isDirectory()) {
                collectTextFiles(absolute, output);
                continue;
              }
              const extension = path.extname(entry.name).toLowerCase();
              if (textExtensions.has(extension) || entry.name === 'Dockerfile') output.push(absolute);
            }
            return output;
          }

          for (const file of collectTextFiles(root)) {
            const content = fs.readFileSync(file, 'utf8');
            for (const forbidden of privateReferences) {
              assert.ok(!content.includes(forbidden), `Private repository reference found in ${path.relative(root, file)}`);
            }
          }

          const temporaryFiles = [
            '.github/workflows/one-time-status-alignment.yml',
            '.github/workflows/app-status-alignment.yml',
            'status-card-diagnostics.txt',
            'FINAL_MAIN_PROOF_TRIGGER.txt',
          ];
          for (const file of temporaryFiles) {
            assert.strictEqual(exists(file), false, `Temporary proof file must not remain: ${file}`);
          }

          const staleStatusText = [
            'Target integration for event workflows; not wired in this demo.',
            'Planned downstream module for invitations and RSVP.',
            'QR check-in direction is shown, not wired in this public demo.',
            'Left out until credentials and approvals are production-safe.',
            'Payment flow is separated for safety and not connected here.',
          ];
          for (const stale of staleStatusText) {
            assert.ok(!server.includes(stale), `Stale connected-app wording remains: ${stale}`);
          }

          assert.ok(
            packageJson.scripts.test.includes('node scripts/status-label-test.js'),
            'npm test must retain the integration-status regression test',
          );
          assert.ok(
            packageJson.scripts.test.includes('node scripts/repository-consistency-test.js'),
            'npm test must include repository consistency verification',
          );

          console.log('Hunter Foreman repository consistency test passed');
          '''
          Path('scripts/repository-consistency-test.js').write_text(consistency_test, encoding='utf-8')

          package_path = Path('package.json')
          package_json = json.loads(package_path.read_text(encoding='utf-8'))
          command = 'node scripts/repository-consistency-test.js'
          if command not in package_json['scripts']['test']:
              package_json['scripts']['test'] += ' && ' + command
          package_path.write_text(json.dumps(package_json, indent=2) + '\n', encoding='utf-8')

          phase_workflow = '''name: Phase 1 Check

          on:
            pull_request:
            push:
              branches:
                - main
                - foreman-demo-implementation

          jobs:
            smoke-test:
              name: Smoke and consistency tests
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node.js
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22

                - name: Install dependencies
                  run: npm install

                - name: Run repository tests
                  run: npm test

                - name: Check demo server syntax
                  run: node --check apps/demo/server.js

                - name: Validate Docker Compose configuration
                  run: docker compose config

            docker-runtime:
              name: Docker build and runtime proof
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Build Docker image
                  run: docker build -t hunter-foreman-final-proof .

                - name: Start and verify container
                  shell: bash
                  run: |
                    set -euo pipefail
                    docker run -d --rm --name hunter-foreman-final-proof -p 3010:3000 hunter-foreman-final-proof
                    trap 'docker logs hunter-foreman-final-proof || true; docker rm -f hunter-foreman-final-proof 2>/dev/null || true' EXIT

                    ready=false
                    for attempt in {1..30}; do
                      if curl --fail --silent http://127.0.0.1:3010/health > /tmp/hunter-health.json; then
                        ready=true
                        break
                      fi
                      sleep 1
                    done
                    test "$ready" = true

                    curl --fail --silent http://127.0.0.1:3010/ > /tmp/hunter-home.html
                    grep -q 'Hunter Foreman' /tmp/hunter-home.html
                    grep -q 'Existing THETECHGUY Events system' /tmp/hunter-home.html
                    grep -q 'Existing payment, referral, and commission workflow' /tmp/hunter-home.html
                    grep -q "'Dashboard Hub','↗','Planned'" /tmp/hunter-home.html
                    grep -q "'Add New App','＋','Planned'" /tmp/hunter-home.html
                    grep -q '"ok": true' /tmp/hunter-health.json
          '''
          phase_workflow = '\n'.join(line[10:] if line.startswith('          ') else line for line in phase_workflow.splitlines()) + '\n'
          Path('.github/workflows/phase-1-check.yml').write_text(phase_workflow, encoding='utf-8')

          trigger = Path('FINAL_MAIN_PROOF_TRIGGER.txt')
          if trigger.exists():
              trigger.unlink()
          PY

      - name: Review changed scope
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff -- README.md package.json scripts/repository-consistency-test.js .github/workflows/phase-1-check.yml
          test "$(git diff --name-only | sort | tr '\n' ' ')" = ".github/workflows/phase-1-check.yml FINAL_MAIN_PROOF_TRIGGER.txt README.md package.json scripts/repository-consistency-test.js "

      - name: Test completed working tree
        shell: bash
        run: |
          set -euo pipefail
          npm test
          node --check apps/demo/server.js
          docker compose config > /tmp/docker-compose-config.txt
          docker build -t hunter-foreman-final-proof .
          docker run -d --rm --name hunter-foreman-final-proof -p 3010:3000 hunter-foreman-final-proof
          trap 'docker logs hunter-foreman-final-proof || true; docker rm -f hunter-foreman-final-proof 2>/dev/null || true' EXIT
          ready=false
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3010/health > /tmp/hunter-health.json; then ready=true; break; fi
            sleep 1
          done
          test "$ready" = true
          curl --fail --silent http://127.0.0.1:3010/ > /tmp/hunter-home.html
          grep -q 'Existing THETECHGUY Events system' /tmp/hunter-home.html
          grep -q 'Existing payment, referral, and commission workflow' /tmp/hunter-home.html
          grep -q "'Dashboard Hub','↗','Planned'" /tmp/hunter-home.html
          grep -q "'Add New App','＋','Planned'" /tmp/hunter-home.html
          grep -q '"ok": true' /tmp/hunter-health.json

      - name: Commit final hardening to proof branch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A README.md package.json scripts/repository-consistency-test.js .github/workflows/phase-1-check.yml FINAL_MAIN_PROOF_TRIGGER.txt
          git commit -m 'Harden final repository consistency and runtime proof [skip ci]'
          git push origin HEAD:${{ github.head_ref }}

      - name: Prove pushed branch from a fresh clone
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          rm -rf /tmp/hunter-foreman-final-clone
          git clone --branch "$HEAD_BRANCH" --single-branch "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/hunter-foreman-final-clone
          cd /tmp/hunter-foreman-final-clone

          npm test
          node --check apps/demo/server.js
          docker compose config > /tmp/final-clone-compose.txt
          docker build -t hunter-foreman-final-clone .
          docker run -d --rm --name hunter-foreman-final-clone -p 3011:3000 hunter-foreman-final-clone
          trap 'docker logs hunter-foreman-final-clone || true; docker rm -f hunter-foreman-final-clone 2>/dev/null || true' EXIT

          ready=false
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3011/health > /tmp/final-clone-health.json; then ready=true; break; fi
            sleep 1
          done
          test "$ready" = true

          curl --fail --silent http://127.0.0.1:3011/ > /tmp/final-clone-home.html
          grep -q 'Existing THETECHGUY Events system' /tmp/final-clone-home.html
          grep -q 'Existing payment, referral, and commission workflow' /tmp/final-clone-home.html
          grep -q "'Dashboard Hub','↗','Planned'" /tmp/final-clone-home.html
          grep -q "'Add New App','＋','Planned'" /tmp/final-clone-home.html
          grep -q '"ok": true' /tmp/final-clone-health.json

          test -z "$(git status --short)"
          echo "FINAL BRANCH PROOF SHA=$(git rev-parse HEAD)"
