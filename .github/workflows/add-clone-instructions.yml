name: Add clone instructions

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-clone-instructions.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Add clone commands and refresh checksum
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          old = '''## Quick Start

```bash
npm install
npm run dev
```'''
          new = '''## Quick Start

```bash
git clone https://github.com/jaydumisuni/hunter-foreman.git
cd hunter-foreman
npm install
npm run dev
```'''
          if old not in text:
              raise SystemExit('Expected Quick Start block was not found.')
          readme.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

          hash="$(sha256sum README.md | awk '{print toupper($1)}')"
          awk -v hash="$hash" 'NR==1 {$0=hash "  README.md"} {print}' proof/SHA256SUMS.txt > proof/SHA256SUMS.txt.tmp
          mv proof/SHA256SUMS.txt.tmp proof/SHA256SUMS.txt
          rm .github/workflows/add-clone-instructions.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md proof/SHA256SUMS.txt .github/workflows/add-clone-instructions.yml
          git commit -m "Add clone commands to Quick Start"
          git push origin HEAD:main
