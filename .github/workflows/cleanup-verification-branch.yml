name: Clean temporary verification branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-verification-branch.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Delete temporary branch and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          git push origin --delete verify-word-streaming || true
          rm .github/workflows/cleanup-verification-branch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/cleanup-verification-branch.yml
          git commit -m "Remove temporary branch cleanup workflow"
          git push origin HEAD:main
