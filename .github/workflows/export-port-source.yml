name: Export port source

on:
  pull_request:
    paths:
      - .github/workflows/export-port-source.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: hunter-foreman-port-source
          path: |
            apps/
            packages/
            scripts/
            package.json
            .env.example
            docker-compose.yml
          if-no-files-found: error
