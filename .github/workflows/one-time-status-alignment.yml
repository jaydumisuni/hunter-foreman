name: One-time repository status diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: read

jobs:
  capture:
    if: github.head_ref == 'align-public-demo-statuses'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ github.token }}
          show-progress: false

      - name: Capture relevant source windows
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          source = Path('apps/demo/server.js').read_text(encoding='utf-8')
          names = [
              'Event Manager',
              'Invitation System',
              'QR Access',
              'WhatsApp Bot',
              'Payment Gateway',
              'Pay Gateway',
              'Dashboard Hub',
              'Add New App',
          ]

          lines = []
          for name in names:
              index = source.find(name)
              lines.append(f'===== {name} | index={index} =====')
              if index >= 0:
                  start = max(0, index - 300)
                  end = min(len(source), index + 1000)
                  snippet = source[start:end]
                  snippet = snippet.replace('\r', '').replace('\n', '\\n')
                  lines.append(snippet)
              lines.append('')

          lines.append('===== STATUS OCCURRENCES =====')
          for match in re.finditer(r'Planned|Under maintenance|Not connected', source):
              start = max(0, match.start() - 180)
              end = min(len(source), match.end() + 260)
              snippet = source[start:end].replace('\r', '').replace('\n', '\\n')
              lines.append(f'-- {match.group(0)} at {match.start()} --')
              lines.append(snippet)

          Path('status-card-diagnostics.txt').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Commit diagnostics to pull request branch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add status-card-diagnostics.txt
          git commit -m 'Capture app status source diagnostics [skip ci]'
          git push origin HEAD:${{ github.head_ref }}
