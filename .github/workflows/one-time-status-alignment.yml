name: One-time repository status alignment

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: read

jobs:
  align-and-prove:
    if: github.head_ref == 'align-public-demo-statuses'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ github.token }}
          show-progress: false

      - name: Apply exact status corrections and add regression test
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json

          server_path = Path('apps/demo/server.js')
          text = server_path.read_text(encoding='utf-8')

          replacements = [
              (
                  ".badge.done{color:var(--g)}.badge.pending{color:var(--o)}.badge.maintenance{color:#ff91bd}",
                  ".badge.done{color:var(--g)}.badge.pending{color:var(--o)}.badge.disconnected{color:var(--o)}.badge.maintenance{color:#ff91bd}",
              ),
              (
                  "['Event Manager','📅','Planned','Target integration for event workflows; not wired in this demo.','pending']",
                  "['Event Manager','📅','Not connected','Existing THETECHGUY Events system; its private production connection is excluded from this public demo.','disconnected']",
              ),
              (
                  "['Invitation System','🎟','Planned','Planned downstream module for invitations and RSVP.','pending']",
                  "['Invitation System','🎟','Not connected','Existing invitation workflow; client-facing data and production services are not connected here.','disconnected']",
              ),
              (
                  "['QR Access','▦','Planned','QR check-in direction is shown, not wired in this public demo.','pending']",
                  "['QR Access','▦','Not connected','Existing guest-access and QR check-in workflow; excluded from the public runtime.','disconnected']",
              ),
              (
                  "['WhatsApp Bot','💬','Under maintenance','Left out until credentials and approvals are production-safe.','maintenance']",
                  "['WhatsApp Bot','💬','Not connected','Existing private business workflow; credentials, approvals, and client conversations remain outside this release.','disconnected']",
              ),
              (
                  "['Payment Gateway','💳','Under maintenance','Payment flow is separated for safety and not connected here.','maintenance']",
                  "['Payment Gateway','💳','Not connected','Existing payment, referral, and commission workflow; transaction services and credentials are excluded from the public demo.','disconnected']",
              ),
              (
                  "['Add New App','＋','Not connected','Planned extension point; no fake connection claim.','']",
                  "['Add New App','＋','Planned','Future extension point for adding additional business applications.','pending']",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one exact source match, found {count}: {old[:100]}')
              text = text.replace(old, new, 1)

          server_path.write_text(text, encoding='utf-8')

          test_source = r'''const assert = require('assert');
          const fs = require('fs');
          const path = require('path');

          const source = fs.readFileSync(path.join(__dirname, '..', 'apps', 'demo', 'server.js'), 'utf8');

          const expected = [
            "['Event Manager','📅','Not connected','Existing THETECHGUY Events system; its private production connection is excluded from this public demo.','disconnected']",
            "['Invitation System','🎟','Not connected','Existing invitation workflow; client-facing data and production services are not connected here.','disconnected']",
            "['QR Access','▦','Not connected','Existing guest-access and QR check-in workflow; excluded from the public runtime.','disconnected']",
            "['WhatsApp Bot','💬','Not connected','Existing private business workflow; credentials, approvals, and client conversations remain outside this release.','disconnected']",
            "['Payment Gateway','💳','Not connected','Existing payment, referral, and commission workflow; transaction services and credentials are excluded from the public demo.','disconnected']",
            "['Dashboard Hub','↗','Planned','Future multi-app routing and operations view.','pending']",
            "['Add New App','＋','Planned','Future extension point for adding additional business applications.','pending']",
          ];

          for (const entry of expected) {
            assert.ok(source.includes(entry), `Missing expected integration state: ${entry}`);
          }

          const forbidden = [
            "['Event Manager','📅','Planned'",
            "['Invitation System','🎟','Planned'",
            "['QR Access','▦','Planned'",
            "['WhatsApp Bot','💬','Under maintenance'",
            "['Payment Gateway','💳','Under maintenance'",
            "['Add New App','＋','Not connected'",
          ];

          for (const entry of forbidden) {
            assert.ok(!source.includes(entry), `Obsolete integration state remains: ${entry}`);
          }

          assert.ok(source.includes('.badge.disconnected{color:var(--o)}'), 'Disconnected badge style must exist');
          console.log('Hunter Foreman integration status label test passed');
          '''
          Path('scripts/status-label-test.js').write_text(test_source, encoding='utf-8')

          package_path = Path('package.json')
          package = json.loads(package_path.read_text(encoding='utf-8'))
          status_command = 'node scripts/status-label-test.js'
          if status_command not in package['scripts']['test']:
              package['scripts']['test'] += ' && ' + status_command
          package_path.write_text(json.dumps(package, indent=2) + '\n', encoding='utf-8')

          diagnostics = Path('status-card-diagnostics.txt')
          if diagnostics.exists():
              diagnostics.unlink()
          PY

      - name: Test changed checkout
        shell: bash
        run: |
          npm test
          node --check apps/demo/server.js
          docker compose config >/tmp/docker-compose-config.txt
          node apps/demo/server.js >/tmp/hunter-foreman.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/ >/tmp/hunter-foreman.html; then break; fi
            sleep 1
          done
          grep -q 'Existing THETECHGUY Events system' /tmp/hunter-foreman.html
          grep -q 'Existing payment, referral, and commission workflow' /tmp/hunter-foreman.html
          grep -q "'Dashboard Hub','↗','Planned'" /tmp/hunter-foreman.html
          grep -q "'Add New App','＋','Planned'" /tmp/hunter-foreman.html

      - name: Commit aligned repository state to pull request branch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A apps/demo/server.js scripts/status-label-test.js package.json status-card-diagnostics.txt
          git commit -m 'Align existing integration labels with public demo boundary [skip ci]'
          git push origin HEAD:${{ github.head_ref }}

      - name: Prove the pushed branch from a fresh clone
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          rm -rf /tmp/hunter-foreman-fresh
          git clone --branch "$HEAD_BRANCH" --single-branch "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" /tmp/hunter-foreman-fresh
          cd /tmp/hunter-foreman-fresh
          npm test
          node --check apps/demo/server.js
          docker compose config >/tmp/fresh-docker-compose-config.txt
          docker build -t hunter-foreman-status-proof .
          docker run -d --rm --name hunter-foreman-status-proof -p 3010:3000 hunter-foreman-status-proof
          trap 'docker rm -f hunter-foreman-status-proof 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3010/ >/tmp/fresh-hunter-foreman.html; then break; fi
            sleep 1
          done
          grep -q 'Existing THETECHGUY Events system' /tmp/fresh-hunter-foreman.html
          grep -q 'Existing payment, referral, and commission workflow' /tmp/fresh-hunter-foreman.html
          grep -q "'Dashboard Hub','↗','Planned'" /tmp/fresh-hunter-foreman.html
          grep -q "'Add New App','＋','Planned'" /tmp/fresh-hunter-foreman.html
          echo "Fresh clone verified at $(git rev-parse HEAD)"
